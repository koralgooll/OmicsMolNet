services:
  flowise:
    image: flowiseai/flowise:3.1.0
    restart: always
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - flowise_data:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"

  flowise-init:
    image: python:3.12-alpine
    depends_on:
      - flowise
    restart: "no"
    env_file:
      - ./.env
    environment:
      # Used by the init script; override if you change network/ports.
      FLOWISE_API_BASE_URL: http://flowise:3000
    volumes:
      - ./init-flowise.py:/app/init-flowise.py:ro
    entrypoint: ["python", "/app/init-flowise.py"]

volumes:
  flowise_data:
