[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omicsmolnet-core"
version = "0.1.0"
description = "Shared domain models and utilities for OmicsMolNet"
requires-python = ">=3.11"
dependencies = [
    "langchain-core",
    "PyYAML",
]

[project.optional-dependencies]
test = ["pytest"]
dev = ["ruff", "mypy"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

