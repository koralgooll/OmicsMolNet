[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omicsmolnet-data"
version = "0.1.0"
description = "Omics data IO, schemas, loaders for OmicsMolNet"
requires-python = ">=3.11"
dependencies = ["omicsmolnet-core"]

[project.optional-dependencies]
test = ["pytest"]
dev = ["ruff", "mypy"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

